<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}CalBar Exam Tutor{% endblock %}</title>
<style>
:root { color-scheme: light; --bg: #f7f9fb; --panel: #ffffff; --line: #d8dee8; --text: #18202b; --muted: #596579; --accent: #0f766e; --warn: #b45309; --bad: #b91c1c; --good: #15803d; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font: 14px/1.6 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

nav { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 20px; padding: 12px 24px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.94); backdrop-filter: blur(8px); }
nav .brand { font-weight: 760; font-size: 16px; color: var(--text); letter-spacing: -0.01em; }
nav a.nav-link { font-weight: 600; font-size: 14px; }

.container { max-width: 1100px; margin: 0 auto; padding: 24px; }
.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 22px; font-weight: 700; }
.page-header p { color: var(--muted); margin-top: 4px; }

.card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 18px; border: none; border-radius: 6px; font: inherit; font-weight: 650; font-size: 13px; cursor: pointer; text-decoration: none; transition: opacity .15s; }
.btn:hover { opacity: 0.85; text-decoration: none; }
.btn-primary { background: var(--accent); color: white; }
.btn-danger { background: var(--bad); color: white; }
.btn-outline { background: transparent; border: 1px solid var(--line); color: var(--text); }

.eyebrow { color: var(--muted); font-size: 11px; font-weight: 760; text-transform: uppercase; letter-spacing: .05em; }
.muted { color: var(--muted); }
.badge { display: inline-block; border: 1px solid var(--line); border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
.badge-good { border-color: var(--good); color: var(--good); }
.badge-warn { border-color: var(--warn); color: var(--warn); }
.badge-bad { border-color: var(--bad); color: var(--bad); }

select, input[type="text"] { min-height: 36px; border: 1px solid var(--line); border-radius: 6px; background: white; color: var(--text); padding: 6px 10px; font: inherit; }
textarea { border: 1px solid var(--line); border-radius: 6px; background: white; color: var(--text); padding: 12px; font: inherit; font-size: 15px; line-height: 1.7; resize: vertical; }
textarea:focus, select:focus, input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<nav>
  <span class="brand">CalBar Exam Tutor</span>
  <a href="/" class="nav-link">Practice</a>
  <a href="/history/" class="nav-link">History</a>
  <a href="/data" class="nav-link">Data Browser</a>
  <a href="/guide" class="nav-link" style="margin-left:auto;">Guide</a>
</nav>
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
