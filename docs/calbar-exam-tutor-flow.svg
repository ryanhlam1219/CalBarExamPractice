<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">CalBar Exam Tutor end-to-end flow</title>
  <desc id="desc">Architecture diagram showing sources, ingestion, database storage, practice workflow, AI analysis context, results, and follow-up chat.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 15px Arial, sans-serif; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .lane-title { fill: #334155; font: 700 16px Arial, sans-serif; letter-spacing: .04em; }
      .box { stroke-width: 2; rx: 10; }
      .box-title { fill: #0f172a; font: 700 16px Arial, sans-serif; }
      .box-text { fill: #475569; font: 13px Arial, sans-serif; }
      .small { fill: #64748b; font: 12px Arial, sans-serif; }
      .source { fill: #eff6ff; stroke: #2563eb; }
      .parse { fill: #f0fdf4; stroke: #16a34a; }
      .db { fill: #fffbeb; stroke: #d97706; }
      .ui { fill: #f5f3ff; stroke: #7c3aed; }
      .ai { fill: #ecfeff; stroke: #0891b2; }
      .result { fill: #fff1f2; stroke: #e11d48; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); }
      .thin-arrow { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
      .note-text { fill: #475569; font: 12px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="900"/>
  <text class="title" x="54" y="52">CalBar Exam Tutor: End-to-End Flow</text>
  <text class="subtitle" x="54" y="78">From official PDFs and local rule materials to practice, Schimmel-guided AI analysis, results, and follow-up tutoring chat.</text>

  <rect class="lane" x="40" y="112" width="1200" height="118"/>
  <text class="lane-title" x="64" y="140">1. SOURCE MATERIALS</text>
  <rect class="box source" x="70" y="158" width="260" height="48"/>
  <text class="box-title" x="88" y="181">CalBar Past Exams</text>
  <text class="box-text" x="88" y="199">Questions and selected answers PDFs</text>
  <rect class="box source" x="380" y="158" width="260" height="48"/>
  <text class="box-title" x="398" y="181">Schimmel Template PDF</text>
  <text class="box-text" x="398" y="199">Subject issue trees and rule funnels</text>
  <rect class="box source" x="690" y="158" width="260" height="48"/>
  <text class="box-title" x="708" y="181">Local Rule Outlines</text>
  <text class="box-text" x="708" y="199">Supplemental parsed legal rules</text>
  <rect class="box source" x="1000" y="158" width="200" height="48"/>
  <text class="box-title" x="1018" y="181">User Essay</text>
  <text class="box-text" x="1018" y="199">Submitted from practice UI</text>

  <rect class="lane" x="40" y="262" width="1200" height="142"/>
  <text class="lane-title" x="64" y="290">2. INGESTION AND PARSING</text>
  <rect class="box parse" x="70" y="310" width="210" height="62"/>
  <text class="box-title" x="88" y="334">Discover + Download</text>
  <text class="box-text" x="88" y="353">Classify CalBar PDFs, hash,</text>
  <text class="box-text" x="88" y="369">write manifests, avoid duplicates</text>
  <rect class="box parse" x="330" y="310" width="210" height="62"/>
  <text class="box-title" x="348" y="334">Extract PDF Text</text>
  <text class="box-text" x="348" y="353">Pages, layout blocks, offsets,</text>
  <text class="box-text" x="348" y="369">quality scores</text>
  <rect class="box parse" x="590" y="310" width="210" height="62"/>
  <text class="box-title" x="608" y="334">Parse Exams</text>
  <text class="box-text" x="608" y="353">Essay questions, selected answers,</text>
  <text class="box-text" x="608" y="369">official subject tables</text>
  <rect class="box parse" x="850" y="310" width="210" height="62"/>
  <text class="box-title" x="868" y="334">Parse Templates</text>
  <text class="box-text" x="868" y="353">Schimmel subject hierarchy,</text>
  <text class="box-text" x="868" y="369">nodes, rule candidates</text>
  <rect class="box parse" x="1090" y="310" width="120" height="62"/>
  <text class="box-title" x="1108" y="334">Parse Rules</text>
  <text class="box-text" x="1108" y="353">Topics, rules,</text>
  <text class="box-text" x="1108" y="369">components</text>

  <rect class="lane" x="40" y="436" width="1200" height="118"/>
  <text class="lane-title" x="64" y="464">3. DATABASE AS SOURCE OF TRUTH</text>
  <rect class="box db" x="70" y="482" width="220" height="48"/>
  <text class="box-title" x="88" y="505">Source Documents</text>
  <text class="box-text" x="88" y="523">Pages, blocks, source spans</text>
  <rect class="box db" x="340" y="482" width="220" height="48"/>
  <text class="box-title" x="358" y="505">Essay Records</text>
  <text class="box-text" x="358" y="523">Questions and selected answers</text>
  <rect class="box db" x="610" y="482" width="220" height="48"/>
  <text class="box-title" x="628" y="505">Schimmel Templates</text>
  <text class="box-text" x="628" y="523">Template nodes and rules</text>
  <rect class="box db" x="880" y="482" width="220" height="48"/>
  <text class="box-title" x="898" y="505">Legal Rules</text>
  <text class="box-text" x="898" y="523">Supplemental rule outlines</text>

  <rect class="lane" x="40" y="586" width="1200" height="126"/>
  <text class="lane-title" x="64" y="614">4. PRACTICE WORKFLOW</text>
  <rect class="box ui" x="70" y="636" width="230" height="52"/>
  <text class="box-title" x="88" y="660">Home / Practice</text>
  <text class="box-text" x="88" y="678">Filter or random question</text>
  <rect class="box ui" x="350" y="636" width="230" height="52"/>
  <text class="box-title" x="368" y="660">Exam Page</text>
  <text class="box-text" x="368" y="678">Timed response editor</text>
  <rect class="box ui" x="630" y="636" width="230" height="52"/>
  <text class="box-title" x="648" y="660">Submit Essay</text>
  <text class="box-text" x="648" y="678">Create submission row</text>
  <rect class="box ui" x="910" y="636" width="260" height="52"/>
  <text class="box-title" x="928" y="660">Processing Screen</text>
  <text class="box-text" x="928" y="678">Shows template/rule context live</text>

  <rect class="lane" x="40" y="744" width="575" height="116"/>
  <text class="lane-title" x="64" y="772">5. AI ANALYSIS CONTEXT</text>
  <rect class="box ai" x="70" y="792" width="240" height="46"/>
  <text class="box-title" x="88" y="815">Question Mapper</text>
  <text class="box-text" x="88" y="833">Official subject table, then keywords</text>
  <rect class="box ai" x="345" y="792" width="240" height="46"/>
  <text class="box-title" x="363" y="815">Prompt Builder</text>
  <text class="box-text" x="363" y="833">Schimmel + rules + answer outline</text>

  <rect class="lane" x="665" y="744" width="575" height="116"/>
  <text class="lane-title" x="689" y="772">6. RESULTS AND TUTORING</text>
  <rect class="box result" x="695" y="792" width="150" height="46"/>
  <text class="box-title" x="713" y="815">Ollama AI</text>
  <text class="box-text" x="713" y="833">JSON analysis</text>
  <rect class="box result" x="885" y="792" width="150" height="46"/>
  <text class="box-title" x="903" y="815">Results UI</text>
  <text class="box-text" x="903" y="833">Scores, funnel, highlights</text>
  <rect class="box result" x="1075" y="792" width="130" height="46"/>
  <text class="box-title" x="1093" y="815">AI Chat</text>
  <text class="box-text" x="1093" y="833">Markdown tutor</text>

  <path class="arrow" d="M200 206 V310"/>
  <path class="arrow" d="M510 206 C510 242 435 260 435 310"/>
  <path class="arrow" d="M820 206 C820 246 955 260 955 310"/>
  <path class="arrow" d="M280 341 H330"/>
  <path class="arrow" d="M540 341 H590"/>
  <path class="arrow" d="M800 341 H850"/>
  <path class="arrow" d="M1060 341 H1090"/>
  <path class="arrow" d="M435 372 V482"/>
  <path class="arrow" d="M695 372 V482"/>
  <path class="arrow" d="M955 372 V482"/>
  <path class="arrow" d="M180 530 V636"/>
  <path class="arrow" d="M300 662 H350"/>
  <path class="arrow" d="M580 662 H630"/>
  <path class="arrow" d="M860 662 H910"/>
  <path class="arrow" d="M1040 688 C1040 732 470 744 470 792"/>
  <path class="arrow" d="M310 815 H345"/>
  <path class="arrow" d="M585 815 H695"/>
  <path class="arrow" d="M845 815 H885"/>
  <path class="arrow" d="M1035 815 H1075"/>

  <path class="thin-arrow" d="M720 530 C720 600 460 710 460 792"/>
  <path class="thin-arrow" d="M990 530 C990 602 502 708 502 792"/>
  <path class="thin-arrow" d="M450 530 C450 590 185 600 185 636"/>

  <rect class="note" x="690" y="706" width="520" height="26"/>
  <text class="note-text" x="706" y="724">Schimmel template is controlling; supplemental rules and selected-answer outlines calibrate issue coverage.</text>
</svg>
